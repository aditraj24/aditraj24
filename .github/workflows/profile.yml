name: Generate GitHub Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          USERNAME: aditraj24
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit 3D Contribution Graph
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "Update 3D contribution graph" && git push)

      - name: Generate Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          USERNAME: aditraj24
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Summary Cards
        run: |
          git add -A
          git diff --cached --quiet || (git commit -m "Update profile summary cards" && git push)
