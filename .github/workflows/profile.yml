name: Generate GitHub Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          USERNAME: aditraj24
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          USERNAME: aditraj24
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check generated files
        run: |
          echo "Checking for generated files..."
          find . -type f -name "*.svg" | head -20
          ls -la profile-3d-contrib/ 2>/dev/null || echo "No profile-3d-contrib directory"
          ls -la profile-summary-card-output/ 2>/dev/null || echo "No profile-summary-card-output directory"

      - name: Commit & Push all changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff-index --quiet HEAD; then
            echo "No changes detected"
          else
            git commit -m "Update GitHub profile stats"
            git push
          fi
